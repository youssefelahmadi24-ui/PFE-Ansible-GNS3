---
- name: "PFE 2026 : Automatisation de l'Infrastructure Réseau Agile"
  hosts: all
  gather_facts: no

  tasks:
    # --- CONFIGURATION DU SWITCH SW1 ---
    - name: "SW1 : Création des VLANs"
      cisco.ios.ios_vlans:
        config:
          - { vlan_id: 10, name: "Serveurs" }
          - { vlan_id: 20, name: "Admin" }
          - { vlan_id: 30, name: "Utilisateurs" }
      when: inventory_hostname == "SW1"

    - name: "SW1 : Configuration du Port Trunk vers R2"
      cisco.ios.ios_config:
        lines:
          - switchport trunk encapsulation dot1q
          - switchport mode trunk
          - no shutdown
        parents: interface GigabitEthernet0/1
      when: inventory_hostname == "SW1"

    # --- CONFIGURATION DU ROUTEUR R2 ---
    - name: "R2 : Configuration des Sous-interfaces"
      cisco.ios.ios_config:
        lines:
          - encapsulation dot1Q {{ item.vlan }}
          - ip address 192.168.{{ item.vlan }}.1 255.255.255.0
        parents: interface FastEthernet1/1.{{ item.vlan }}
      loop:
        - { vlan: 10 }
        - { vlan: 20 }
        - { vlan: 30 }
      when: inventory_hostname == "R2"

    - name: "R2 : Configuration des Pools DHCP"
      cisco.ios.ios_config:
        lines:
          - network 192.168.{{ item }}.0 255.255.255.0
          - default-router 192.168.{{ item }}.1
          - dns-server 8.8.8.8
        parents: ip dhcp pool POOL_VLAN{{ item }}
      loop: [10, 20, 30]
      when: inventory_hostname == "R2"

    # --- SAUVEGARDE ---
    - name: "Sauvegarde de la configuration"
      cisco.ios.ios_command:
        commands: write memory
