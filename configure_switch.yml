---
- name: Configuration de SW1 (Cisco IOSvL2)
  hosts: switches
  gather_facts: false

  tasks:
    # 1. INFO
    - name: Récupérer les informations du switch
      cisco.ios.ios_facts:
        gather_subset: min

    # 2. HOSTNAME
    - name: Configurer le hostname
      cisco.ios.ios_hostname:
        config:
          hostname: "{{ inventory_hostname }}"

    # 3. VLANS
    - name: Créer les VLANs de production
      cisco.ios.ios_vlans:
        config:
          - { vlan_id: 10, name: "Serveurs" }
          - { vlan_id: 20, name: "Admin" }
          - { vlan_id: 30, name: "Utilisateurs" }

    # 4. TRUNK (Vers R2 sur Gi0/1)
    - name: Configurer le Trunk Gi0/1 vers R2
      cisco.ios.ios_config:
        lines:
          - description Link_to_R2
          - switchport trunk encapsulation dot1q
          - switchport mode trunk
          - switchport trunk allowed vlan 10,20,30
        parents: interface GigabitEthernet0/1

    # 5. ACCESS PORTS
    - name: Configurer les ports d'accès
      cisco.ios.ios_l2_interfaces:
        config:
          - name: GigabitEthernet0/2
            mode: access
            access:
              vlan: 20
          - name: GigabitEthernet0/3
            mode: access
            access:
              vlan: 30
          - name: GigabitEthernet1/0
            mode: access
            access:
              vlan: 10

    # 6. SSH CONFIG
    - name: Configurer le domaine et SSH
      cisco.ios.ios_config:
        lines:
          - ip domain-name pfe.local
          - ip ssh version 2

    - name: Configurer les lignes VTY
      cisco.ios.ios_config:
        lines:
          - login local
          - transport input ssh
        parents: line vty 0 4

    - name: Générer la clé RSA
      cisco.ios.ios_config:
        lines:
          - crypto key generate rsa general-keys modulus 1024
        match: none
